<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理中心 - 图书管理系统</title>
    <link href="/layui/css/layui.css" rel="stylesheet"/>
    <style>
        /* 现代配色方案 */
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --sidebar-bg: #1a1f2e;
            --sidebar-active: #667eea;
            --text-light: #ffffff;
            --text-muted: #a0aec0;
            --card-bg: #ffffff;
            --hover-bg: rgba(102, 126, 234, 0.1);
        }

        body {
            font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f7fa;
        }

        /* 侧边栏样式 */
        .layui-side {
            background: var(--sidebar-bg) !important;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }

        .layui-nav-tree {
            background: transparent !important;
        }

        .layui-nav-tree .layui-nav-item a {
            color: var(--text-muted);
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .layui-nav-tree .layui-nav-item a:hover {
            color: var(--text-light);
            background: var(--hover-bg);
            border-left-color: var(--primary-color);
        }

        .layui-nav-tree .layui-nav-itemed > a,
        .layui-nav-tree .layui-this > a {
            color: var(--text-light) !important;
            background: linear-gradient(90deg, var(--hover-bg) 0%, transparent 100%) !important;
            border-left-color: var(--primary-color);
        }

        .layui-nav-tree .layui-nav-child {
            background: rgba(0,0,0,0.15) !important;
        }

        .layui-nav-tree .layui-nav-child dd.layui-this,
        .layui-nav-tree .layui-nav-child dd.layui-this a {
            background: var(--primary-color) !important;
            color: white !important;
        }

        .layui-nav-tree .layui-nav-bar {
            background: var(--primary-color);
        }

        /* 主体内容区域 */
        .layui-body {
            background: #f5f7fa;
            padding: 20px;
            bottom: 0;
        }

        /* 欢迎区域 */
        .welcome-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .welcome-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .welcome-section h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .welcome-section p {
            font-size: 16px;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        /* 统计卡片 */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }

        .stat-card.books::before {
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
        }

        .stat-card.users::before {
            background: linear-gradient(180deg, #f093fb 0%, #f5576c 100%);
        }

        .stat-card.categories::before {
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
        }

        .stat-card.records::before {
            background: linear-gradient(180deg, #43e97b 0%, #38f9d7 100%);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 24px;
            color: white;
        }

        .stat-card.books .stat-icon {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .stat-card.users .stat-icon {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .stat-card.categories .stat-icon {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .stat-card.records .stat-icon {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #888;
            font-size: 14px;
        }

        /* 快捷入口 */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .quick-action-btn {
            background: white;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
        }

        .quick-action-btn:hover {
            border-color: var(--primary-color);
            background: var(--hover-bg);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
        }

        .quick-action-btn i {
            font-size: 28px;
            color: var(--primary-color);
            margin-bottom: 10px;
            display: block;
        }

        .quick-action-btn span {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        /* 轮播图容器 */
        .carousel-section {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary-color);
        }

        .layui-carousel {
            border-radius: 12px;
            overflow: hidden;
        }

        .layui-carousel img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 768px) {
            .quick-actions {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<div class="layui-layout layui-layout-admin">

    <div th:include="common/admin_header :: header"></div>

    <div class="layui-side">
        <div class="layui-side-scroll">
            <ul class="layui-nav layui-nav-tree">
                <li class="layui-nav-item">
                    <a href="javascript:;">
                        <i class="layui-icon layui-icon-read" style="margin-right: 8px;"></i>书籍管理
                    </a>
                    <dl class="layui-nav-child">
                        <dd><a href="/addBookPage">
                            <i class="layui-icon layui-icon-add-1" style="margin-right: 5px;"></i>录入新书
                        </a></dd>
                        <dd><a href="/addCategoryPage?pageNum=1">
                            <i class="layui-icon layui-icon-senior" style="margin-right: 5px;"></i>新建类别
                        </a></dd>
                        <dd><a href="/showBooksPage">
                            <i class="layui-icon layui-icon-search" style="margin-right: 5px;"></i>查询书籍
                        </a></dd>
                    </dl>
                </li>

                <li class="layui-nav-item">
                    <a href="javascript:;">
                        <i class="layui-icon layui-icon-username" style="margin-right: 8px;"></i>用户管理
                    </a>
                    <dl class="layui-nav-child">
                        <dd><a href="/showUsersPage?pageNum=1">
                            <i class="layui-icon layui-icon-group" style="margin-right: 5px;"></i>查询用户
                        </a></dd>
                        <dd><a href="/addUserPage">
                            <i class="layui-icon layui-icon-add-circle" style="margin-right: 5px;"></i>新增用户
                        </a></dd>
                    </dl>
                </li>

                <li class="layui-nav-item">
                    <a href="javascript:;">
                        <i class="layui-icon layui-icon-form" style="margin-right: 8px;"></i>借阅信息
                    </a>
                    <dl class="layui-nav-child">
                        <dd><a href="/allBorrowBooksRecordPage?pageNum=1">
                            <i class="layui-icon layui-icon-list" style="margin-right: 5px;"></i>所有记录
                        </a></dd>
                    </dl>
                </li>

                <li class="layui-nav-item">
                    <a href="/adminInfoPage">
                        <i class="layui-icon layui-icon-username" style="margin-right: 8px;"></i>个人信息
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div class="layui-body">
        <!-- 欢迎区域 -->
        <div class="welcome-section">
            <h1>欢迎回来，<span th:text="${session.admin.getAdminName()}">管理员</span>！</h1>
            <p>管理系统运行正常，祝您工作愉快</p>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-container">
            <div class="stat-card books">
                <div class="stat-icon">
                    <i class="layui-icon layui-icon-read"></i>
                </div>
                <div class="stat-value">管理</div>
                <div class="stat-label">书籍管理</div>
            </div>
            <div class="stat-card users">
                <div class="stat-icon">
                    <i class="layui-icon layui-icon-username"></i>
                </div>
                <div class="stat-value">管理</div>
                <div class="stat-label">用户管理</div>
            </div>
            <div class="stat-card categories">
                <div class="stat-icon">
                    <i class="layui-icon layui-icon-senior"></i>
                </div>
                <div class="stat-value">管理</div>
                <div class="stat-label">类别管理</div>
            </div>
            <div class="stat-card records">
                <div class="stat-icon">
                    <i class="layui-icon layui-icon-form"></i>
                </div>
                <div class="stat-value">查看</div>
                <div class="stat-label">借阅记录</div>
            </div>
        </div>

        <!-- 快捷入口 -->
        <div class="quick-actions">
            <a href="/addBookPage" class="quick-action-btn">
                <i class="layui-icon layui-icon-add-1"></i>
                <span>录入新书</span>
            </a>
            <a href="/showUsersPage?pageNum=1" class="quick-action-btn">
                <i class="layui-icon layui-icon-group"></i>
                <span>查询用户</span>
            </a>
            <a href="/allBorrowBooksRecordPage?pageNum=1" class="quick-action-btn">
                <i class="layui-icon layui-icon-form"></i>
                <span>借阅记录</span>
            </a>
            <a href="/adminInfoPage" class="quick-action-btn">
                <i class="layui-icon layui-icon-set"></i>
                <span>个人设置</span>
            </a>
        </div>

        <!-- 轮播图 -->
        <div class="carousel-section" style="margin-top: 30px;">
            <div class="section-title">
                <i class="layui-icon layui-icon-picture"></i>
                图书馆风采
            </div>
            <div class="layui-carousel" id="index">
                <div carousel-item>
                    <div><img src="/images/lib1.jpg"/></div>
                    <div><img src="/images/lib2.jpg"/></div>
                    <div><img src="/images/lib3.jpg"/></div>
                    <div><img src="/images/lib4.jpg"/></div>
                    <div><img src="/images/lib5.jpg"/></div>
                </div>
            </div>
        </div>
    </div>

    <div th:include="common/footer :: footer"></div>

</div>

<script src="/scripts/jquery.min.js"></script>
<script src="/layui/layui.js"></script>
<script>
    layui.use(['carousel', 'element'], function () {
        let carousel = layui.carousel;
        let element = layui.element;

        carousel.render({
            elem: '#index'
            , width: '100%'
            , height: '400px'
            , interval: 3000
            , anim: 'fade'
        });
    });
</script>

</body>
</html>
