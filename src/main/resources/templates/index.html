<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>


    <link rel="stylesheet" th:href="@{/layui/css/layui.css}">
    <style>

        body {
            /*width: 100%;*/
            /*height: 100%;*/
            background: url("/images/background.png") no-repeat;
            /*background: url("static/images/a.png") no-repeat;*/
            background-size: cover;
        }

        #login_form {
            width: 400px;
            height: 480px;
            margin: 80px auto;
            padding: 30px;
            background-color: #f2f2f2;
            opacity: 0.9;
        }

    </style>
</head>
<body>

<div id="wrapper">
    <div class="layui-container" id="login_form">

        <div>
            <h1 style="color: red">图书管理系统</h1>
            <br>
            <h2>用户登录</h2>
            <br>
        </div>

        <form class="layui-form" id="my_form" method="post" action="/userLogin">

            <div class="layui-form-item">
                <label class="layui-form-label">用户名:</label>
                <div class="layui-input-block">
                    <input type="text" name="userName" id="username" autofocus
                           placeholder="请输入用户名" autocomplete="off" class="layui-input">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">密 码:</label>
                <div class="layui-input-block">
                    <input type="password" name="password" id="password"
                           placeholder="请输入密码" autocomplete="off" class="layui-input">
                </div>
            </div>


            <div class="layui-form-item">
                <label class="layui-form-label">验证码:</label>
                <div class="layui-input-block">
                    <input type="text" name="captcha" id="captcha"
                           placeholder="请输入验证码" autocomplete="off" class="layui-input" style="width: 120px; display: inline-block;">
                    <img id="captchaImg" src="/captcha" style="height: 38px; cursor: pointer; vertical-align: middle; margin-left: 10px;" title="点击刷新验证码">
                </div>
            </div>

            <div class="layui-form-item">
                <label class="layui-form-label">用户身份</label>
                <div class="layui-input-block">
                    <input class="form-check-input" type="radio" name="role" value="1" title="学生" checked>
                    <input class="form-check-input" type="radio" name="role" value="0" title="管理员">
                </div>
            </div>

            <div class="layui-form-item layui-col-md4 layui-col-md-offset4">
                <button id="sub_btn" class="layui-btn layui-btn-normal">登录</button>
            </div>

        </form>

    </div>
</div>


<script th:src="@{/scripts/jquery.min.js}"></script>
<script th:src="@{/layui/layui.js}"></script>


<script th:inline="javascript">
    layui.use(['layer', 'form'], function () {
        let layer = layui.layer;
        let form = layui.form;
        form.render();

        $(function () {
            let flag = [[${session.flag}]];
            if (flag == 1) {
                layer.msg("用户名或密码错误", {
                    icon: 2,
                    time: 2000
                });
            } else if (flag == 2) {
                layer.msg("验证码错误", {
                    icon: 2,
                    time: 2000
                });
            }
            
            $("#captchaImg").click(function () {
                $(this).attr("src", "/captcha?t=" + new Date().getTime());
            });
        });
    });


    $("#sub_btn").click(function () {
        let username = $("#username").val();
        let user_judge = check(username);

        if (user_judge) {
            let password = $("#password").val();
            let pwd_judge = check(password);

            if (pwd_judge) {
                let captcha = $("#captcha").val();
                let captcha_judge = check(captcha);
                
                if (!captcha_judge) {
                    layer.alert("验证码不能为空", {icon: 5});
                    return false;
                }

                let role_id = $('input[name="role"]:checked').val();

                if (role_id == 1) {
                    $("#my_form").submit();
                } else {
                    $("#my_form").attr("action", "/adminLogin")
                    $("#my_form").submit();
                }

            } else {
                layer.alert("密码不能为空", {icon: 5});
                return false;
            }
        } else {

            layer.alert("用户名不能为空", {icon: 5});
            return false;
        }
    });

    function check(val) {
        val = val.toString().trim();
        return !(val == '');
    }

</script>
</body>
</html>
