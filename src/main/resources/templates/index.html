<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书管理系统 - 登录</title>
    <link rel="stylesheet" th:href="@{/layui/css/layui.css}">
    <link rel="stylesheet" th:href="@{/css/modern-style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-title {
            text-align: center;
            margin-bottom: 2rem;
            color: white;
        }

        .login-title h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .login-title p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .form-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--secondary-color);
            z-index: 10;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon input {
            padding-left: 45px !important;
        }

        .role-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .role-option {
            flex: 1;
            text-align: center;
            padding: 1rem;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            transition: var(--transition);
        }

        .role-option.active {
            border-color: var(--primary-color);
            background-color: rgba(37, 99, 235, 0.05);
            color: var(--primary-color);
        }

        .role-option i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-title">
            <h1><i class="fa fa-book" style="margin-right: 10px;"></i>图书管理系统</h1>
            <p>智慧管理 · 阅读无限</p>
        </div>

        <div class="modern-card">
            <form class="layui-form" id="loginForm" method="post">
                <div class="layui-form-item">
                    <div class="input-with-icon">
                        <i class="fa fa-user form-icon"></i>
                        <input type="text" name="userName" id="username" autofocus
                               placeholder="请输入用户名" autocomplete="off" class="layui-input modern-input">
                    </div>
                </div>

                <div class="layui-form-item">
                    <div class="input-with-icon">
                        <i class="fa fa-lock form-icon"></i>
                        <input type="password" name="password" id="password"
                               placeholder="请输入密码" autocomplete="off" class="layui-input modern-input">
                    </div>
                </div>

                <div class="role-selector">
                    <div class="role-option active" data-role="1">
                        <i class="fa fa-graduation-cap"></i>
                        <span>学生用户</span>
                    </div>
                    <div class="role-option" data-role="0">
                        <i class="fa fa-user-circle"></i>
                        <span>管理员</span>
                    </div>
                    <input type="hidden" name="role" id="role" value="1">
                </div>

                <div class="layui-form-item">
                    <button type="button" id="sub_btn" class="layui-btn layui-btn-fluid modern-btn" style="background-color: var(--primary-color);">
                        <i class="fa fa-sign-in"></i> 立即登录
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script th:src="@{/scripts/jquery.min.js}"></script>
    <script th:src="@{/layui/layui.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.js"></script>

    <script th:inline="javascript">
        layui.use(['layer', 'form'], function () {
            let layer = layui.layer;
            let form = layui.form;

            $(function () {
                let flag = [[${session.flag}]];
                if (flag) {
                    layer.msg("用户名或密码错误", {
                        icon: 2,
                        time: 3000,
                        anim: 6
                    });
                }
            });

            $('.role-option').click(function() {
                $('.role-option').removeClass('active');
                $(this).addClass('active');
                $('#role').val($(this).data('role'));
            });
        });

        $("#sub_btn").click(function () {
            let username = $("#username").val().trim();
            if (username === '') {
                layer.tips('用户名不能为空', '#username', {tips: 1});
                return false;
            }

            let password = $("#password").val().trim();
            if (password === '') {
                layer.tips('密码不能为空', '#password', {tips: 1});
                return false;
            }

            let encryptedPassword = CryptoJS.MD5(password).toString();
            $("#password").val(encryptedPassword);

            let role_id = $('#role').val();
            let form = $("#loginForm");

            if (role_id == 1) {
                form.attr("action", "/userLogin");
            } else {
                form.attr("action", "/adminLogin");
            }

            form.submit();
        });
    </script>
</body>
</html>
