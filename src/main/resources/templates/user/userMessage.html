<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 图书管理系统</title>
    <link href="/layui/css/layui.css" rel="stylesheet"/>
    <link href="/css/modern-style.css" rel="stylesheet"/>
    <style>
        .profile-container {
            padding: 20px;
        }

        .profile-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 20px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 700;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .profile-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .profile-role {
            font-size: 14px;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .profile-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .card-header {
            padding: 20px 30px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
        }

        .card-desc {
            font-size: 13px;
            color: #718096;
        }

        .card-body {
            padding: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            color: #2d3748;
            background: #f7fafc;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .form-input:disabled {
            background: #edf2f7;
            cursor: not-allowed;
        }

        .form-input.editable {
            background: #fff;
            border-color: #667eea;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-primary {
            padding: 14px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            padding: 14px 32px;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            color: #4a5568;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .btn-edit {
            padding: 14px 32px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }

        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(17, 153, 142, 0.5);
        }

        .info-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
        }

        .edit-mode .form-input:disabled {
            background: #fff;
            cursor: text;
            border-color: #667eea;
        }
    </style>
</head>
<body class="layui-layout-body">
<div class="layui-layout layui-layout-admin">

    <div th:include="common/user_header :: header"></div>

    <div class="layui-side layui-bg-black">
        <div class="layui-side-scroll">
            <ul class="layui-nav layui-nav-tree">
                <li class="layui-nav-item">
                    <a href="javascript:;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
                            <path d="M4 19.5C4 18.837 4.26339 18.2011 4.73223 17.7322C5.20107 17.2634 5.83696 17 6.5 17H20"/>
                            <path d="M6.5 2H20V22H6.5C5.83696 22 5.20107 21.7366 4.73223 21.2678C4.26339 20.7989 4 20.163 4 19.5V4.5C4 3.83696 4.26339 3.20107 4.73223 2.73223C5.20107 2.26339 5.83696 2 6.5 2Z"/>
                        </svg>
                        借阅管理
                    </a>
                    <dl class="layui-nav-child">
                        <dd><a href="/userBorrowBookRecord">借书记录</a></dd>
                        <dd><a href="/borrowingPage">借阅书籍</a></dd>
                    </dl>
                </li>

                <li class="layui-nav-item">
                    <a href="javascript:;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21L16.65 16.65"/>
                        </svg>
                        书籍管理
                    </a>
                    <dl class="layui-nav-child">
                        <dd><a href="/userReturnBooksPage">归还书籍</a></dd>
                        <dd><a href="/findBookPage">查询书籍</a></dd>
                    </dl>
                </li>
                <li class="layui-nav-item layui-this">
                    <a href="/userMessagePage">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
                            <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        个人信息
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div class="layui-body">
        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-avatar" th:text="${#strings.substring(session.user.getUserName(), 0, 1)}"></div>
                <h1 class="profile-name" th:text="${session.user.getUserName()}"></h1>
                <p class="profile-role">
                    <span class="info-badge">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 10V18C22 19.1046 21.1046 20 20 20H4C2.89543 20 2 19.1046 2 18V10"/>
                            <path d="M12 2L2 10L12 18L22 10L12 2Z"/>
                        </svg>
                        学生用户
                    </span>
                </p>
            </div>

            <div class="profile-card">
                <div class="card-header">
                    <div class="card-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <div>
                        <h2 class="card-title">基本资料</h2>
                        <p class="card-desc">查看和修改您的个人信息</p>
                    </div>
                </div>
                <div class="card-body" id="profileCardBody">
                    <form id="profileForm">
                        <input type="hidden" name="userId" th:value="${session.user.getUserId()}">
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">用户名</label>
                                <input type="text" name="userName" class="form-input" 
                                       th:value="${session.user.getUserName()}" disabled>
                            </div>
                            <div class="form-group">
                                <label class="form-label">电子邮箱</label>
                                <input type="email" name="userEmail" class="form-input" 
                                       th:value="${session.user.getUserEmail()}" placeholder="请输入电子邮箱" disabled>
                            </div>
                        </div>

                        <div class="btn-group" id="viewBtnGroup">
                            <button type="button" id="editBtn" class="btn-edit">
                                <span>修改信息</span>
                            </button>
                        </div>

                        <div class="btn-group" id="editBtnGroup" style="display: none;">
                            <button type="button" id="saveBtn" class="btn-primary">
                                <span>保存修改</span>
                            </button>
                            <button type="button" id="cancelBtn" class="btn-secondary">
                                <span>取消</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:include="common/footer :: footer"></div>

</div>

<script src="/scripts/jquery.min.js"></script>
<script src="/layui/layui.js"></script>
<script th:inline="javascript">
    layui.use(['layer', 'form'], function () {
        let layer = layui.layer;
        let form = layui.form;
        let isEditMode = false;

        $("#editBtn").click(function () {
            isEditMode = true;
            $("input[name='userEmail']").prop('disabled', false).addClass('editable');
            $("#viewBtnGroup").hide();
            $("#editBtnGroup").show();
            $("#profileCardBody").addClass('edit-mode');
        });

        $("#cancelBtn").click(function () {
            isEditMode = false;
            location.reload();
        });

        $("#saveBtn").click(function () {
            let formData = $("#profileForm").serialize();
            
            $.ajax({
                url: '/updateUserMessage',
                type: 'POST',
                data: formData,
                success: function (result) {
                    if (result === "success") {
                        layer.msg("修改成功", {
                            icon: 1,
                            time: 2000
                        }, function () {
                            location.reload();
                        });
                    } else {
                        layer.msg("修改失败", {
                            icon: 2,
                            time: 2000
                        });
                    }
                },
                error: function () {
                    layer.msg("网络错误", {
                        icon: 2,
                        time: 2000
                    });
                }
            });
        });

        $("#resetBtn").click(function () {
            location.reload();
        });
    });
</script>

</body>
</html>
